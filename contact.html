<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicegg's Portfolio - Socials</title>
    <link rel="icon" type="image/svg+xml" href="asset-logo.svg">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/ixb4gts.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="contact-page">
    <header class="about-header" id="top">
        <a class="about-logo" href="index.html" aria-label="Back to home">
            <div class="about-logo__img" aria-hidden="true"></div>
        </a>
        <p class="about-header-title">CHICEGG'S SOCIALS</p>
        <div class="about-menu-wrap">
            <button
                class="about-menu-button"
                type="button"
                aria-label="Toggle quick menu"
                aria-controls="about-quick-menu"
                aria-expanded="false"
            ></button>

            <div class="about-quick-menu" id="about-quick-menu" hidden>
                <a class="about-quick-menu-button" href="about.html">About</a>
                <a class="about-quick-menu-button" href="digital-art.html">Works</a>
            </div>
        </div>
    </header>

    <main class="contact-stage">
        <section class="contact-layout" aria-label="Chicegg social links and portrait illustration">
            <div class="contact-social-copy">
                <div  aria-label="Social media links">
                    <a
                        class="contact-social-item" data-animate="fade-up"
                        href="https://www.instagram.com/chicegg01/"
                        target="_blank"
                        rel="noreferrer"
                        aria-label="Visit Instagram profile @chicegg01"
                    >
                        <span class="contact-social-icon contact-social-icon--instagram" aria-hidden="true"></span>
                        <span class="contact-social-handle">@chicegg01</span>
                    </a>

                    <a
                        class="contact-social-item" data-animate="fade-up"
                        href="https://www.tiktok.com/@chicegg01"
                        target="_blank"
                        rel="noreferrer"
                        aria-label="Visit TikTok profile @chicegg01"
                    >
                        <span class="contact-social-icon contact-social-icon--tiktok" aria-hidden="true"></span>
                        <span class="contact-social-handle">@chicegg01</span>
                    </a>
                </div>

                <p class="contact-thanks-copy" data-animate="fade-up">
                    Thanks for viewing my portfolio.<br>
                    Have a great day today!!
                </p>
            </div>

            <button
                class="contact-pan-button"
                type="button"
                data-contact-pan
                aria-label="Toggle Chicegg illustration"
                aria-pressed="false"
            ></button>
        </section>
    </main>

    <footer class="about-footer" id="social-footer">
        <p>&copy; 2026 Chicegg. All rights reserved.</p>
    </footer>
</body>
</html>
